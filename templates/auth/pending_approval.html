<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approval - auditpro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Outfit:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/globals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/output.css') }}">
</head>

<body class="bg-background-light min-h-screen flex items-center justify-center font-sans antialiased text-slate-800 relative overflow-hidden selection:bg-blue-600/30 selection:text-slate-900">

    <!-- Ambient background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute w-[800px] h-[800px] bg-blue-300 rounded-full blur-[120px] mix-blend-multiply opacity-10 -translate-x-1/2 -translate-y-1/2 top-0 left-0"></div>
        <div class="absolute w-[600px] h-[600px] bg-cyan-200 rounded-full blur-[100px] mix-blend-multiply opacity-10 translate-x-1/3 translate-y-1/3 bottom-0 right-0"></div>
    </div>

    <div class="w-full max-w-md z-10 px-4 animate-fade-in-up">

        <div class="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
            <!-- Top accent line -->
            <div class="h-1 bg-gradient-to-r from-amber-400 via-amber-500 to-orange-400"></div>

            <div class="p-8 text-center">
                <!-- Icon -->
                <div class="w-16 h-16 mx-auto mb-4 bg-amber-50 border border-amber-200 rounded-2xl flex items-center justify-center shadow-sm text-amber-500">
                    <span class="material-symbols-outlined text-[36px]">hourglass_empty</span>
                </div>

                <h1 class="text-2xl font-bold leading-none tracking-tight text-slate-900 mb-3">Account Pending Approval</h1>
                <p class="text-slate-500 text-sm leading-relaxed mb-6">
                    Your account was created and is awaiting administrator approval.<br>
                    Please contact your admin to get access.
                </p>

                <a href="/auth/login" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:opacity-75 transition-opacity">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Back to sign in
                </a>
            </div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-5">
            &copy; 2026 auditpro Compliance Platform. All rights reserved.
        </p>
    </div>
</body>

</html>
